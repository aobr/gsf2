version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  # gsf compiles a Fortran extension at install time, so the docs build needs
  # a Fortran compiler and cmake available.
  apt_packages:
    - gfortran
    - cmake

sphinx:
  configuration: doc/conf.py

formats: all

python:
  install:
    - method: pip
      path: .[docs]
